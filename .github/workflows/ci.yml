name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      # rebuild every embedded UI so the embedded HTML always matches source
      - name: Build embedded UIs
        run: |
          for ui in dashboard src/AspNetMailbox/ui src/AspNetFlags/ui src/AspNetJobs/ui src/AspNetVitals/ui; do
            (cd "$ui" && npm ci && npm run build)
          done

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack
        run: |
          for proj in src/AspNetDebugDashboard src/AspNetDebugDashboard.Mcp src/AspNetDebugDashboard.Suite \
                      src/AspNetMailbox src/AspNetFlags src/AspNetJobs src/AspNetVitals; do
            dotnet pack "$proj" -c Release --no-build -o artifacts
          done

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
          retention-days: 14
