name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.0)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard UI
        run: |
          cd dashboard
          npm ci
          npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build and test
        run: |
          dotnet restore
          dotnet build --no-restore -c Release
          dotnet test --no-build -c Release

      - name: Pack
        run: |
          for proj in src/AspNetDebugDashboard src/AspNetDebugDashboard.Mcp; do
            dotnet pack "$proj" -c Release --no-build -o artifacts \
              -p:PackageVersion=${{ steps.version.outputs.version }} \
              -p:AssemblyVersion=${{ steps.version.outputs.version }} \
              -p:FileVersion=${{ steps.version.outputs.version }}
          done

      - name: Push
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
          retention-days: 30
